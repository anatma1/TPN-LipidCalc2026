<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPN LipidCalc</title>
    <style>
        :root {
            --primary: #0284c7; 
            --primary-light: #e0f2fe; /* תכלת עדין */
            --primary-soft: #f0f9ff;
            --success: #059669; 
            --success-bg: #ecfdf5;
            --warning: #d97706; 
            --warning-light: #fef9c3; /* צהוב פסטל */
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --bg: linear-gradient(135deg, #f0fdfa 0%, #eff6ff 100%); 
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 10px; 
            direction: rtl; color: var(--text-main);
            min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 450px; margin: 0 auto;
            background: #ffffff; border-radius: 24px;
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.08);
            overflow: hidden; border: 1px solid #f8fafc;
        }

        .header {
            background: #ffffff; color: var(--primary);
            padding: 15px 15px 10px; text-align: center;
            border-bottom: 1px solid var(--primary-soft);
        }
        
        .header-icon {
            font-size: 1.8rem; margin-bottom: 5px;
            display: inline-block;
            background: var(--primary-soft);
            width: 50px; height: 50px; line-height: 50px;
            border-radius: 50%;
        }

        .header h1 { margin: 0; font-size: 1.3rem; font-weight: 800; }

        .content { padding: 12px 15px; background: #fbfdfe; }

        .input-card {
            background: #ffffff; border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; margin-bottom: 10px;
        }
        
        .step-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .step-num {
            background: var(--primary-light); color: var(--primary);
            width: 24px; height: 24px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.85rem;
        }
        .step-text { font-weight: 700; font-size: 1rem; color: var(--text-main); }

        .input-row { display: flex; align-items: center; justify-content: space-between; }

        input, select {
            padding: 10px; border: 2px solid #f1f5f9;
            border-radius: 10px; font-size: 0.95rem; font-weight: 600;
            box-sizing: border-box; background: #f8fafc;
        }

        /* שדה משקל - תכלת עדין */
        .weight-input {
            width: 85px !important;
            background: var(--primary-light) !important;
            border-color: #bae6fd !important;
            text-align: center;
        }

        /* שדה קצב - צהוב פסטל */
        .rate-input {
            width: 85px !important;
            background: var(--warning-light) !important;
            border-color: #fde047 !important;
            text-align: center;
        }

        .result-card {
            background: var(--success-bg); border: 2px solid #a7f3d0;
            border-radius: 18px; padding: 15px; text-align: center;
            display: none; margin-top: 10px;
        }

        .result-val { font-size: 2.6rem; font-weight: 900; color: var(--success); margin: 0; line-height: 1; }
        
        .reason-box {
            display: inline-flex; align-items: center;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; margin: 8px 0;
            white-space: nowrap; 
        }
        .reason-weight { background: #ffffff; color: var(--primary); border: 1px solid var(--primary-light); }
        .reason-perc { background: #ffffff; color: var(--warning); border: 1px solid #fde68a; }

        .result-meta { 
            font-size: 0.85rem; color: #064e3b; margin-top: 10px; 
            border-top: 1px dashed #a7f3d0; padding-top: 10px; text-align: right;
        }

        .pharmacist-warning {
            background: var(--danger-bg); border: 1px solid #fecaca;
            color: var(--danger); border-radius: 10px; padding: 8px;
            margin-top: 10px; font-size: 0.75rem; font-weight: 700;
            display: none; text-align: right;
        }

        .footer { text-align: center; padding: 12px; font-size: 0.7rem; color: #94a3b8; font-weight: 500; }
        
        option.dex-10 { color: #3b82f6; font-weight: bold; } 
        option.dex-12-5 { color: #10b981; font-weight: bold; } 
        option.dex-15 { color: #ef4444; font-weight: bold; } 
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="header-icon">🩺</div>
        <h1>TPN LipidCalc</h1>
        <p>Schneider Children's Medical Center</p>
    </div>
    <div class="content">
        <div class="input-card">
            <div class="input-row">
                <div class="step-title" style="margin:0;"><div class="step-num">1</div><div class="step-text">משקל המטופל (ק"ג)</div></div>
                <input type="number" id="w" class="weight-input" placeholder="0.0" min="0.1" step="0.1" oninput="calc()">
            </div>
        </div>
        <div class="input-card">
            <div class="step-title"><div class="step-num">2</div><div class="step-text">הגדרת שקית הזנה</div></div>
            <select id="bag" onchange="updateBagColor(); calc();" style="margin-bottom: 10px;">
                <option value="" disabled selected>בחירת שקית סטנדרטית...</option>
                <option value="300-15" class="dex-15" data-kcal="189.9" data-vol="300">🔴 300ml 15%DEX</option>
                <option value="500-12.5" class="dex-12-5" data-kcal="253" data-vol="500">🟢 500ml 12.5%DEX</option>
                <option value="500-15" class="dex-15" data-kcal="316.5" data-vol="500">🔴 500ml 15%DEX</option>
                <option value="1000-10" class="dex-10" data-kcal="442" data-vol="1000">🔵 1000ml 10%DEX</option>
                <option value="1500-10" class="dex-10" data-kcal="673" data-vol="1500">🔵 1500ml 10%DEX</option>
                <option value="1500-15" class="dex-15" data-kcal="929" data-vol="1500">🔴 1500ml 15%DEX</option>
                <option value="2000-10" class="dex-10" data-kcal="923.4" data-vol="2000">🔵 2000ml 10%DEX</option>
                <option value="2000-15" class="dex-15" data-kcal="1265.4" data-vol="2000">🔴 2000ml 15%DEX</option>
            </select>
            <div class="input-row">
                <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">קצב שקית (מ"ל/שעה)</span>
                <input type="number" id="rBag" class="rate-input" placeholder="0.0" min="0.1" step="0.1" oninput="calc()">
            </div>
        </div>
        <div class="input-card">
            <div class="step-title"><div class="step-num">3</div><div class="step-text">🥑 בחירת תמיסת שומן</div></div>
            <select id="fType" onchange="calc()">
                <option value="" disabled selected>בחר סוג שומן...</option>
                <option value="6">מזרק SMOF+Vitamines</option>
                <option value="10">Omegaven (10%)</option>
                <option value="5">בקבוק SMOF / Lipofundin (20%)</option>
            </select>
        </div>
        <div id="resCard" class="result-card">
            <div id="resRate" class="result-val">0.0</div>
            <div style="font-weight:800; font-size:1rem; color:#059669;">מ"ל / שעה</div>
            <div id="reasonTag" class="reason-box"></div>
            <div id="resMeta" class="result-meta"></div>
            <div id="pharmacyWarning" class="pharmacist-warning">⚠️ <b>שים/י לב:</b> באומגוון עם ויטמינים - יש להתייעץ עם הרוקחת.</div>
        </div>
    </div>
    <div class="footer">כל הזכויות שמורות לענת מסלנסקי - דיאטנית קלינית.</div>
</div>
<script>
function updateBagColor() {
    const b = document.getElementById('bag');
    const s = b.options[b.selectedIndex];
    b.style.color = s.classList.contains('dex-10') ? '#3b82f6' : s.classList.contains('dex-12-5') ? '#10b981' : s.classList.contains('dex-15') ? '#ef4444' : '';
    b.style.fontWeight = 'bold';
}
function calc() {
    const w = parseFloat(document.getElementById('w').value), b = document.getElementById('bag'), r = parseFloat(document.getElementById('rBag').value), f = parseFloat(document.getElementById('fType').value), c = document.getElementById('resCard'), p = document.getElementById('pharmacyWarning');
    if (!w || w <= 0 || !b.value || !r || r <= 0 || !f) { c.style.display = 'none'; return; }
    c.style.display = 'block';
    const o = b.options[b.selectedIndex], k = (r * 24) * (parseFloat(o.dataset.kcal) / parseFloat(o.dataset.vol));
    const m = (f === 10) ? 1.0 : 1.5, lw = w * m, lp = ((4/6) * k) / 10;
    let fg = 0, t = document.getElementById('reasonTag');
    if (lw <= lp) { fg = lw; t.innerHTML = `⚖️ הוגבל לפי משקל (${m} ג'/ק"ג)`; t.className = "reason-box reason-weight"; }
    else { fg = lp; t.innerHTML = "🔥 הוגבל לפי קלוריות (40% מהסך)"; t.className = "reason-box reason-perc"; }
    document.getElementById('resRate').innerText = ((fg * f) / 24).toFixed(1);
    document.getElementById('resMeta').innerHTML = `סה"כ שומן יומי: <b>${fg.toFixed(1)} גרם</b><br>יחס שומן למשקל: <b>${(fg/w).toFixed(2)} גרם/ק"ג</b>`;
    p.style.display = (f === 10) ? 'block' : 'none';
}
</script>
</body>
</html>
